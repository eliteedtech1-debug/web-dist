    <script>
      // Auto-reload on new deployment with better cache handling
      const APP_VERSION = '__BUILD_TIME__';
      const CHECK_INTERVAL = 2 * 60 * 1000; // Check every 2 minutes
      
      function checkForUpdates() {
        fetch('/index.html?' + Date.now(), { 
          method: 'HEAD',
          cache: 'no-cache'
        })
        .then(() => {
          const currentVersion = localStorage.getItem('app_version');
          if (currentVersion && currentVersion !== APP_VERSION) {
            console.log('New version detected, clearing cache and reloading...');
            
            // Clear all caches
            if ('caches' in window) {
              caches.keys().then(names => {
                names.forEach(name => caches.delete(name));
              });
            }
            
            // Clear storage
            localStorage.clear();
            sessionStorage.clear();
            
            // Force reload with cache bypass
            window.location.reload(true);
          } else {
            localStorage.setItem('app_version', APP_VERSION);
          }
        })
        .catch(err => console.log('Update check failed:', err));
      }
      
      // Check immediately and periodically
      checkForUpdates();
      setInterval(checkForUpdates, CHECK_INTERVAL);
      
      // Also check when page becomes visible (user switches back to tab)
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          checkForUpdates();
        }
      });
    </script>
